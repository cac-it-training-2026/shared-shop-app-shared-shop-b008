<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">
<head>
    <title>レビュー一覧 | [[#{shop.title}]]</title>
    <meta charset="UTF-8" />
</head>
<body class="user">
    <h2 class="title">「[[${item.name}]]」のレビュー一覧</h2>

    <div class="review_summary_area">
        <div class="review_aggregate">
            <span class="rating_star" th:each="i : ${#numbers.sequence(1, 5)}"
                th:text="${i <= avgRating} ? '★' : '☆'"></span>
            <span th:text="|（${avgRating}）|"></span>
            <span th:text="|${reviewCount}件のレビュー|"></span>
        </div>

        <div class="sort_area">
            <form th:action="@{/client/review/list/{itemId}(itemId=${item.id})}" method="get">
                並び替え：
                <select name="sortType" onchange="this.form.submit()">
                    <option value="1" th:selected="${sortType == 1}">新しい順</option>
                    <option value="2" th:selected="${sortType == 2}">評価が高い順</option>
                    <option value="3" th:selected="${sortType == 3}">評価が低い順</option>
                </select>
            </form>
        </div>
    </div>

    <section class="item_reviews">
        <div th:if="${!#lists.isEmpty(reviews)}">
            <article class="review_item" th:each="review : ${reviews}">
                <div class="review_header">
                    <span class="review_user" th:text="${review.user.name}"></span>
                    <span class="rating_star" th:each="i : ${#numbers.sequence(1, 5)}"
                        th:text="${i <= review.rating} ? '★' : '☆'"></span>
                    <span class="review_date" th:text="${#dates.format(review.insertDate, 'yyyy/MM/dd')}"></span>
                </div>
                <div class="review_comment">
                    <p th:text="${review.reviewComment}"></p>
                </div>
                <div class="review_actions" th:if="${session.user != null and (session.user.id == review.user.id or session.user.authority <= 1)}">
                    <form th:action="@{/client/review/delete/{id}(id=${review.id})}" method="post" onsubmit="return confirm('本当に削除しますか？');">
                        <input type="hidden" name="itemId" th:value="${item.id}" />
                        <input type="submit" value="削除" class="delete_button" />
                    </form>
                </div>
            </article>
        </div>
        <div th:if="${#lists.isEmpty(reviews)}">
            <p>レビューはまだ投稿されていません。</p>
        </div>
        <div class="button_area">
            <a th:href="@{/client/item/detail/{id}(id=${item.id})}" class="back_button">商品詳細へ戻る</a>
        </div>
    </section>
</body>
</html>
