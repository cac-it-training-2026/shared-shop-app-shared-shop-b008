<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">

<head>
	<title th:text="#{item}+#{title.detail}+' | '+ #{shop.title}"> </title>
	<meta charset="UTF-8" />
</head>

<body class="user">

	<h2 th:class="title" th:text="#{item}+#{title.detail}"></h2>

	<div class="info_form_area" th:object="${item}">
		<div class="item_detail_area">
			<div class="item_image_area">
				<img th:if="*{image != null}" th:src="@{/images/{image}(image=*{image})}"></img>
				<img th:if="*{image == null}" th:src="@{/images/common/no_image.jpg}"></img>
			</div>
			<dl class="item_detail_list">
				<dt>[[#{data.item.name}]]</dt>
				<dd th:text="*{name}"></dd>
				<dt>[[#{data.item.price}]]</dt>
				<dd th:text="*{price}"></dd>
				<dt>[[#{data.item.stock}]]</dt>
				<dd th:if="*{stock > 5}" th:text="#{data.in.stock}"></dd>
				<dd th:if="*{stock >= 1 and 5 >= stock }" th:text="*{stock}"></dd>
				<dd th:if="*{stock == 0}" th:text="#{data.out.of.stock}"></dd>
				<dt>[[#{data.category}]]</dt>
				<dd th:text="*{categoryName}"></dd>
				<dt>[[#{data.description}]]</dt>
				<dd th:text="*{description}"></dd>
			</dl>
		</div>
		<div class="detail_button_area">
			<form th:action="@{/client/basket/add}" method="post" class="user_info_form" th:if="*{stock > 0}">
				<input type="hidden" th:field="*{id}" />
				<input type="submit" value="買い物かごに入れる" class="send_button" />
			</form>
			<form th:action="@{/client/item/list/1}" method="post">
				<input type="submit" value="戻る" class="back_button" />
			</form>
		</div>
	</div>

	<div class="review_area">
		<h3 th:text="#{data.review.list}"></h3>

		<div class="review_sort_area" th:if="${totalReviewCount > 0}">
			<span th:if="${reviewSortType==1}" th:text="#{sort.latest.str}"></span>
			<a th:unless="${reviewSortType==1}" th:href="@{/client/item/detail/{id}(id=${item.id},sortType=1,all=${isAll})}"
				th:text="#{sort.latest.str}"></a>
			<span th:if="${reviewSortType==2}" th:text="#{sort.rating.high.str}"></span>
			<a th:unless="${reviewSortType==2}" th:href="@{/client/item/detail/{id}(id=${item.id},sortType=2,all=${isAll})}"
				th:text="#{sort.rating.high.str}"></a>
			<span th:if="${reviewSortType==3}" th:text="#{sort.rating.low.str}"></span>
			<a th:unless="${reviewSortType==3}" th:href="@{/client/item/detail/{id}(id=${item.id},sortType=3,all=${isAll})}"
				th:text="#{sort.rating.low.str}"></a>
		</div>

		<p th:if="${totalReviewCount == 0}" th:text="#{data.review.none}"></p>

		<table class="list_table review_list" th:if="${totalReviewCount > 0}">
			<tr>
				<th th:text="#{data.review.user}"></th>
				<th th:text="#{data.review.rating}"></th>
				<th th:text="#{data.review.comment}"></th>
				<th th:text="#{data.review.date}"></th>
				<th th:if="${session.user != null}"></th>
			</tr>
			<tr th:each="review : ${reviews}">
				<td th:text="${review.userName}"></td>
				<td>
					<span th:if="${review.rating == 5}">★★★★★</span>
					<span th:if="${review.rating == 4}">★★★★☆</span>
					<span th:if="${review.rating == 3}">★★★☆☆</span>
					<span th:if="${review.rating == 2}">★★☆☆☆</span>
					<span th:if="${review.rating == 1}">★☆☆☆☆</span>
					(<span th:text="${review.rating}"></span>)
				</td>
				<td th:text="${review.reviewComment}"></td>
				<td th:text="${review.insertDate}"></td>
				<td th:if="${session.user != null}">
					<form th:if="${session.user.id == review.userId or session.user.authority == 0 or session.user.authority == 1}"
						th:action="@{/client/review/delete/{id}(id=${review.id})}" method="post">
						<input type="submit" value="削除" class="delete_button" onclick="return confirm('本当に削除しますか？')" />
					</form>
				</td>
			</tr>
		</table>

		<div class="all_reviews_button" th:if="${totalReviewCount > 5 and !isAll}">
			<a th:href="@{/client/item/detail/{id}(id=${item.id},sortType=${reviewSortType},all=true)}"
				th:text="#{data.review.all}"></a>
		</div>
	</div>

</body>

</html>
