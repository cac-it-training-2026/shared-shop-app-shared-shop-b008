<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">

<head>
	<script th:src="@{/js/payment_input.js}" type="text/javascript"></script>
	<title th:text="#{title.order.payment.input}+' | '+ #{shop.title}"> </title>
	<meta charset="UTF-8" />
</head>

<body class="user order_payment_input">
	<h2 th:class="title" th:text="#{title.order.payment.input}"></h2>
	<p th:class="input_message" th:text="#{msg.order.payment.input}"></p>

	<div class="user_info_form_area">
		<form th:action="@{/client/order/check}" method="post">
			<ul class="payment_method_select">
				<li>
					<label class="radio_label">
						<input type="radio" name="payMethod" value="1" th:if="${payMethod == 1}" checked="checked"
							onclick=" payChange();" />
						<input type="radio" name="payMethod" value="1"
							th:unless="${payMethod == 1}" />[[#{paymethod.credit.str}]]
					</label>
				</li>
				<li>
					<label class="radio_label">
						<input type="radio" name="payMethod" value="2" th:if="${payMethod == 2}" checked="checked"
							onclick=" payChange();" />
						<input type="radio" name="payMethod" value="2"
							th:unless="${payMethod == 2}" />[[#{paymethod.bank.str}]]
					</label>
				</li>
				<li>
					<label class="radio_label">
						<input type="radio" name="payMethod" value="3" th:if="${payMethod  == 3}" checked="checked"
							onclick=" payChange();" />
						<input type="radio" name="payMethod" value="3"
							th:unless="${payMethod  == 3}" />[[#{paymethod.onarrival.str}]]
					</label>
				</li>
				<li>
					<label class="radio_label">
						<input type="radio" name="payMethod" value="4" th:if="${payMethod == 4}" checked="checked"
							onclick=" payChange();" />
						<input type="radio" name="payMethod" value="4"
							th:unless="${payMethod == 4}" />[[#{paymethod.emoney.str}]]
					</label>
				</li>
				<li>
					<label class="radio_label">
						<input type="radio" name="payMethod" value="5" th:if="${payMethod == 5}" checked="checked"
							onclick=" payChange();" />
						<input type="radio" name="payMethod" value="5"
							th:unless="${payMethod == 5}" />[[#{paymethod.convenience.str}]]
					</label>
				</li>
			</ul>

			<section class="coupon_payment_area">
				<h3>クーポンを利用する</h3>
				<p class="coupon_error" th:if="${couponError != null}" th:text="${couponError}"></p>
				<div class="payment_total_row">
					<span>商品合計</span>
					<strong id="orderTotal" th:attr="data-total=${total}"
						th:text="|${#numbers.formatInteger(total, 1, 'COMMA')}円|"></strong>
				</div>
				<label for="couponId">利用するクーポン</label>
				<select id="couponId" name="couponId" onchange="updateCouponPreview()">
					<option value="" data-rate="0">クーポンを利用しない</option>
					<option th:each="coupon : ${couponBeans}"
						th:value="${coupon.id}"
						th:attr="data-rate=${coupon.discountRate}"
						th:disabled="${!coupon.available}"
						th:selected="${selectedCouponId != null and selectedCouponId == coupon.id}"
						th:text="|${coupon.name}（${#numbers.formatInteger(coupon.minimumOrderAmount, 1, 'COMMA')}円以上）${coupon.available ? '' : '― ご注文金額が不足しています'}|">
					</option>
				</select>
				<p class="coupon_empty" th:if="${#lists.isEmpty(couponBeans)}" th:text="#{msg.coupon.payment.none}"></p>
				<div class="coupon_preview" aria-live="polite">
					<p><span>クーポン割引（節約額）</span><strong id="couponDiscount"
						th:text="'-' + ${#numbers.formatInteger(couponDiscountAmount, 1, 'COMMA')} + '円'"></strong></p>
					<p class="discounted_total"><span>割引後合計</span><strong id="discountedTotal"
						th:text="${#numbers.formatInteger(discountedTotal, 1, 'COMMA')} + '円'"></strong></p>
				</div>
			</section>

			<input type="submit" class="send_button" value="次へ" />

		</form>
		<form th:action="@{/client/order/payment/back}" method="post" class="update">
			<input type="submit" class="back_button" value="戻る" />
		</form>
	</div>
	<script>
		function updateCouponPreview() {
			const total = Number(document.getElementById('orderTotal').dataset.total);
			const select = document.getElementById('couponId');
			const rate = Number(select.options[select.selectedIndex].dataset.rate || 0);
			const discount = Math.floor(total * rate / 100);
			document.getElementById('couponDiscount').textContent = '-' + discount.toLocaleString('ja-JP') + '円';
			document.getElementById('discountedTotal').textContent = (total - discount).toLocaleString('ja-JP') + '円';
		}
	</script>
</body>

</html>
