<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">

<head>
	<title th:text="#{title.coupon.gacha}+' | '+#{shop.title}"></title>
	<meta charset="UTF-8" />
</head>

<body class="user coupon_gacha">
	<div class="coupon_page">
	<h2 class="title" th:text="#{title.coupon.gacha}"></h2>
	<p class="coupon_lead">毎日1回、午前7時にチャレンジ回数が更新されます。</p>

	<div class="coupon_message" th:if="${couponMessage != null}"
		th:classappend="${couponMessageType}" th:text="${couponMessage}"></div>
	<script th:if="${couponMessage != null}" th:inline="javascript">
		window.alert(/*[[${couponMessage}]]*/ 'クーポンガチャの結果');
	</script>

	<section class="gacha_panel">
		<div class="gacha_wheel" aria-label="クーポンガチャのラインナップ">
			<span class="wheel_15">15%</span>
			<span class="wheel_10">10%</span>
			<span class="wheel_5">5%</span>
			<span class="wheel_miss">はずれ</span>
		</div>
		<div class="gacha_status">
			<p>保有枚数 <strong th:text="|${couponCount}／${couponLimit}枚|"></strong></p>
			<p th:if="${drawnToday}">本日のガチャは実行済みです。</p>
			<p th:unless="${drawnToday}">本日のガチャに挑戦できます。</p>
			<p>次回更新：<time th:text="${nextDrawAt}"></time></p>
			<form th:action="@{/client/coupon/gacha/draw}" method="post">
				<input type="submit" class="gacha_button" value="ガチャを回す" th:disabled="${!canDraw}" />
			</form>
			<p class="coupon_limit_note" th:if="${couponCount >= couponLimit}">
				保有上限に達しています。クーポンを利用すると再び挑戦できます。
			</p>
		</div>
	</section>

	<section class="gacha_lineup">
		<h3>ラインナップ</h3>
		<table class="list_table">
			<tr><th>結果</th><th>確率</th><th>最低利用金額</th><th>有効期間</th></tr>
			<tr><td>はずれ</td><td>40％</td><td>―</td><td>―</td></tr>
			<tr th:each="coupon : ${couponLineup}">
				<td th:text="${coupon.name}"></td>
				<td th:switch="${coupon.discountRate}">
					<span th:case="5">35％</span>
					<span th:case="10">20％</span>
					<span th:case="15">5％</span>
					<span th:case="*">―</span>
				</td>
				<td th:text="|${#numbers.formatInteger(coupon.minimumOrderAmount, 1, 'COMMA')}円以上|"></td>
				<td>獲得から30日</td>
			</tr>
		</table>
	</section>

	<div class="coupon_actions">
		<a class="coupon_link_button" th:href="@{/client/coupon/list}">マイクーポンを見る</a>
	</div>
	</div>
</body>

</html>
